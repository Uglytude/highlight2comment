<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>highlight2comment</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="popup-header">
        <h1>highlight2comment</h1>
        <div
          id="note-count-toggle"
          class="count"
          role="button"
          tabindex="0"
          aria-expanded="false"
          aria-controls="notes-panel"
          data-i18n-aria-label="notesListToggleLabel"
        >
          <span id="note-count">0</span>
          <span data-i18n="countUnit"></span>
        </div>
      </header>

      <section
        id="notes-panel"
        class="notes-panel"
        aria-labelledby="notes-list-title"
        hidden
      >
        <header class="notes-panel-header">
          <h2 id="notes-list-title" data-i18n="notesListTitle"></h2>
          <button
            id="notes-panel-close"
            class="notes-panel-close"
            type="button"
            data-i18n-aria-label="closeLabel"
          >
            &times;
          </button>
        </header>
        <div id="notes-list" class="notes-list"></div>
      </section>

      <section id="obsidian-state-row" class="state" aria-live="polite">
        <div>
          <span class="label" data-i18n="obsidianLabel"></span>
          <span id="obsidian-state"></span>
        </div>
      </section>

      <section id="guardian-hint" class="guardian-hint" hidden>
        <p data-i18n="guardianHintMessage"></p>
        <button
          id="guardian-hint-dismiss"
          type="button"
          data-i18n="guardianHintDismissButton"
        ></button>
      </section>

      <div class="actions">
        <button
          id="connect-button"
          type="button"
          data-i18n="connectObsidianFolderButton"
        ></button>
        <button
          id="download-button"
          type="button"
          data-i18n="downloadAllButton"
        ></button>
      </div>

      <p id="status" class="status" role="status"></p>
      <p id="connected-directory" class="connected-directory" hidden>
        <span id="connected-directory-summary"></span>
        <a id="reauthorize-link" href="#" data-i18n="changeFolderLink"></a>
      </p>
      <p id="extension-version" class="extension-version"></p>
    </main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
