<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>highlight2comment</title>
    <link rel="stylesheet" href="./popup.css" />
  </head>
  <body>
    <main class="popup">
      <header class="popup-header">
        <h1>highlight2comment</h1>
        <div class="count">
          <span id="note-count">0</span>
          <span data-i18n="countUnit"></span>
        </div>
      </header>

      <section class="state" aria-live="polite">
        <div>
          <span class="label" data-i18n="obsidianLabel"></span>
          <span id="obsidian-state"></span>
        </div>
      </section>

      <div class="actions">
        <button
          id="connect-button"
          type="button"
          data-i18n="connectObsidianFolderButton"
        ></button>
        <button
          id="download-button"
          type="button"
          data-i18n="downloadAllButton"
        ></button>
      </div>

      <p id="status" class="status" role="status"></p>
      <p id="connected-directory" class="connected-directory" hidden>
        <span id="connected-directory-summary"></span>
        <a id="reauthorize-link" href="#" data-i18n="changeFolderLink"></a>
      </p>
    </main>
    <script type="module" src="./popup.js"></script>
  </body>
</html>
