<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title></title>
    <style>
      :root {
        color-scheme: light;
      }

      body {
        background: #f8f9fa;
        color: #202124;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
        margin: 0;
      }

      main {
        background: #ffffff;
        border: 1px solid #dadce0;
        border-radius: 12px;
        box-sizing: border-box;
        margin: 48px auto;
        max-width: 480px;
        padding: 24px;
      }

      h1 {
        font-size: 20px;
        margin: 0 0 14px;
      }

      #sync-status {
        color: #5f6368;
        font-size: 14px;
        line-height: 1.5;
        margin: 0 0 18px;
      }

      #sync-status.error {
        color: #b3261e;
      }

      button {
        background: #202124;
        border: 1px solid #202124;
        border-radius: 7px;
        color: #ffffff;
        cursor: pointer;
        font-family: inherit;
        font-size: 14px;
        font-weight: 650;
        min-height: 36px;
        padding: 0 14px;
      }

      button:disabled {
        cursor: default;
        opacity: 0.55;
      }

      button[hidden] {
        display: none;
      }

      .hint {
        color: #80868b;
        font-size: 12px;
        line-height: 1.5;
        margin: 18px 0 0;
      }

      .extension-version {
        color: #b3b6ba;
        font-size: 10px;
        margin: 6px 0 0;
        text-align: center;
      }
    </style>
  </head>
  <body>
    <main>
      <h1 data-i18n="syncTabTitle"></h1>
      <p id="sync-status" role="status" aria-live="polite"></p>
      <button
        id="reconnect-button"
        type="button"
        data-i18n="reconnectAndWriteObsidianButton"
      ></button>
      <p class="hint" data-i18n="syncTabKeepOpenHint"></p>
      <p id="extension-version" class="extension-version"></p>
    </main>
    <script type="module" src="./sync-tab.js"></script>
  </body>
</html>
